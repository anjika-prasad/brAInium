version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: neo4j/changeme123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # browser UI
      - "7687:7687"   # bolt
    volumes:
      - neo4j_data:/data

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ikb
      POSTGRES_PASSWORD: ikb
      POSTGRES_DB: ikb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  neo4j_data:
  postgres_data:
